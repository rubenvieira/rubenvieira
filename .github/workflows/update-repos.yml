name: Update Repo List
on:
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch repos and update README
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Fetch public non-fork repos using GitHub CLI
          repos=$(gh api graphql -F owner=$GITHUB_REPOSITORY_OWNER -f query='
            query($owner: String!) {
              user(login: $owner) {
                repositories(first: 100, isFork: false, privacy: PUBLIC, orderBy: {field: PUSHED_AT, direction: DESC}) {
                  nodes {
                    name
                    url
                    description
                    stargazerCount
                  }
                }
              }
            }
          ' --jq '.data.user.repositories.nodes[] | "- [**\(.name)**](\(.url)) \(if .description then " - \(.description)" else "" end) \(if .stargazerCount > 0 then "⭐ \(.stargazerCount)" else "" end)"')
          
          # Replace content between markers in README.md
          awk -v r="$repos" '
          /<!-- \/repos -->/ { in_repos=0 }
          !in_repos { print }
          /<!-- repos -->/ { print r; in_repos=1 }
          ' README.md > README.md.tmp && mv README.md.tmp README.md
          
      - name: Commit changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md
          git diff --quiet && git diff --staged --quiet || git commit -m "docs: update repository list"
          git push
